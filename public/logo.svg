<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="portbridge logo">
  <defs>
    <linearGradient id="pb-stream-top" x1="2" y1="14" x2="30" y2="24" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22d3ee" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="pb-stream-bottom" x1="2" y1="34" x2="30" y2="24" gradientUnits="userSpaceOnUse">
      <stop stop-color="#c084fc" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="pb-ring" x1="30" y1="12" x2="46" y2="36" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38dcf2"/>
      <stop offset="1" stop-color="#c084fc"/>
    </linearGradient>
    <radialGradient id="pb-core" cx="0.5" cy="0.5" r="0.5">
      <stop stop-color="#eafbff"/>
      <stop offset="0.55" stop-color="#8fe9ff"/>
      <stop offset="1" stop-color="#c084fc" stop-opacity="0.2"/>
    </radialGradient>
    <filter id="pb-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#pb-glow)" stroke-linecap="round" fill="none" stroke-width="3.2">
    <path d="M3 15 C 16 15, 22 20, 33 24" stroke="url(#pb-stream-top)"/>
    <path d="M3 33 C 16 33, 22 28, 33 24" stroke="url(#pb-stream-bottom)"/>
  </g>
  <g filter="url(#pb-glow)">
    <circle cx="34" cy="24" r="10" stroke="url(#pb-ring)" stroke-width="3.4" fill="none"/>
    <circle cx="34" cy="24" r="4.4" fill="url(#pb-core)"/>
  </g>
</svg>
